version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: signalforce-postgres
    environment:
      POSTGRES_USER: fuzzy
      POSTGRES_PASSWORD: fuzzy
      POSTGRES_DB: signalforce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
